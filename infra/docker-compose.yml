services:
  db:
    image: postgres:16-alpine
    container_name: aiodocs_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_docs}
      POSTGRES_USER: ${POSTGRES_USER:-ai_docs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_docs_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

